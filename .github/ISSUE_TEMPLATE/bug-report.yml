name: Bug report
description: Report something broken in the Electron app, CLI, MCP, or integrations.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Keep it short — we only need enough to reproduce it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include your OS/app version if you know it.
      placeholder: "The desktop pet disappeared after..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: List the shortest steps that trigger the issue.
      placeholder: |
        1. Open OpenPets
        2. ...
        3. The bug happens
    validations:
      required: true
